<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TensorFlow.js MNIST – Classification & Denoising Autoencoder</title>

<!-- TensorFlow.js -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>

<!-- tfjs-vis -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis@latest"></script>

<style>

body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f5f5f5;
}

header{
  background:#222;
  color:white;
  padding:10px 20px;
}

.container{
  display:grid;
  grid-template-columns:350px 1fr;
  gap:10px;
  padding:10px;
}

.panel{
  background:white;
  border-radius:6px;
  padding:10px;
  margin-bottom:10px;
  box-shadow:0 0 4px rgba(0,0,0,0.15);
}

button{
  margin:3px;
  padding:6px 10px;
}

.preview-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
}

.preview-block{
  text-align:center;
}

.preview-block canvas{
  border:1px solid #ccc;
}

.log-box{
  height:120px;
  overflow:auto;
  background:#111;
  color:#0f0;
  padding:5px;
  font-family:monospace;
}

.small{
  font-size:12px;
  color:#555;
}

</style>
</head>

<body>

<header>
<h2>TensorFlow.js MNIST Demo – Classification & Denoising Autoencoder</h2>
</header>

<div class="container">

<div>

<div class="panel">
<h3>Upload Data</h3>

<label>Upload Train CSV</label><br>
<input type="file" id="trainFile"><br><br>

<label>Upload Test CSV</label><br>
<input type="file" id="testFile">

</div>

<div class="panel">

<h3>Mode</h3>

<label>
<input type="radio" name="mode" value="classification" checked>
Classification
</label><br>

<label>
<input type="radio" name="mode" value="denoising-max">
Denoising (MaxPooling)
</label><br>

<label>
<input type="radio" name="mode" value="denoising-avg">
Denoising (AvgPooling)
</label>

</div>

<div class="panel">

<h3>Noise Level</h3>

<input type="range" id="noiseSlider" min="0" max="0.5" step="0.01" value="0.3">
<span id="noiseValue">0.30</span>

<p class="small">Controls Gaussian noise added during denoising.</p>

</div>

<div class="panel">

<h3>Controls</h3>

<button id="loadDataBtn">Load Data</button>
<button id="trainBtn">Train</button>
<button id="evaluateBtn">Evaluate</button>
<button id="testFiveBtn">Test 5 Random</button>

<hr>

<button id="comparePoolingBtn">Compare Pooling</button>

<hr>

<button id="saveBtn">Save Model</button>

<br><br>

<label>Load model.json</label><br>
<input type="file" id="modelJson"><br>

<label>Load weights.bin</label><br>
<input type="file" id="modelWeights"><br>

<button id="loadModelBtn">Load Model</button>

<hr>

<button id="resetBtn">Reset</button>
<button id="toggleVisorBtn">Toggle Visor</button>

</div>

<div class="panel">
<h3>Data Status</h3>
<div id="dataStatus">No data loaded.</div>
</div>

<div class="panel">
<h3>Training Logs</h3>
<div id="logBox" class="log-box"></div>
</div>

</div>

<div>

<div class="panel">
<h3>Metrics</h3>
<div id="metrics"></div>
</div>

<div class="panel">
<h3>Denoising Preview</h3>
<div id="previewArea"></div>
</div>

</div>

</div>

<!-- Important: loader BEFORE app -->
<script defer src="data-loader.js"></script>
<script defer src="app.js"></script>

</body>
</html>
